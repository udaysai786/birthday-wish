<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:#fff;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    max-width:500px;
    width:90%;
}

h1{
    color:#333;
    margin-bottom:15px;
}

p{
    color:#666;
    line-height:1.6;
    margin-bottom:25px;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#45a049;
}
</style>

</head>
<body>

<div class="container">
    <h1>👋 Welcome</h1>

    <p>
        Thank you for visiting.<br><br>
        The special birthday page is no longer available.
    </p>

    <button onclick="window.location.href='https://google.com'">
        Continue
    </button>
</div>

</body>
</html>
