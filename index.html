<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;
    min-height:100vh;

    background:
    radial-gradient(circle at top,#2c1b5a,#120d28 45%,#050510);

    position:relative;
    font-family:Arial,sans-serif;

}

/* Animated Stars */

body::before{

    content:"";
    position:absolute;
    inset:0;

    background-image:
    radial-gradient(#ffffff 1px,transparent 1px),
    radial-gradient(#ffd700 1px,transparent 1px);

    background-size:60px 60px,90px 90px;

    opacity:.4;

    animation:stars 50s linear infinite;

}

@keyframes stars{

from{
transform:translateY(0);
}

to{
transform:translateY(-400px);
}

}

/* Floating Hearts */

.heart{

    position:absolute;

    color:#ff4f91;

    animation:float linear infinite;

    opacity:.8;

    pointer-events:none;

}

@keyframes float{

0%{

    transform:translateY(100vh) scale(.5);
    opacity:0;

}

20%{

    opacity:1;

}

100%{

    transform:translateY(-120vh) scale(1.5);
    opacity:0;

}

}

/* Card */

.card{

    position:relative;

    z-index:10;

    width:100%;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    animation:zoom 5s ease-in-out infinite alternate;

}

.card img{

    width:100%;

    max-width:700px;

    max-height:90vh;

    height:auto;

    object-fit:contain;

    display:block;

    border-radius:20px;

    box-shadow:
    0 0 40px rgba(255,180,0,.5),
    0 0 90px rgba(255,105,180,.35);

}

@keyframes zoom{

from{
transform:scale(1);
}

to{
transform:scale(1.03);
}

}

/* Tablet */

@media(max-width:768px){

.card{

    padding:15px;

}

.card img{

    max-width:100%;

    max-height:82vh;

    border-radius:18px;

}

}

/* Mobile */

@media(max-width:480px){

.card{

    padding:10px;

}

.card img{

    max-height:75vh;

    border-radius:14px;

}

}

/* Large Desktop */

@media(min-width:1400px){

.card img{

    max-width:900px;

}

}

</style>

</head>

<body>

<div class="card">

<img src="birthday2.png" alt="Happy Birthday">

</div>

<script>

const symbols=["💖","💕","💗","✨","🌸","🎈","💝"];

for(let i=0;i<40;i++){

    let s=document.createElement("div");

    s.className="heart";

    s.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];

    s.style.left=Math.random()*100+"vw";

    s.style.animationDuration=(6+Math.random()*8)+"s";

    s.style.animationDelay=Math.random()*8+"s";

    s.style.fontSize=(18+Math.random()*22)+"px";

    document.body.appendChild(s);

}

function showReaction(emoji){

    const popup=document.getElementById("reactionPopup");

    popup.innerHTML=emoji;

    popup.style.opacity="1";
    popup.style.transform="translate(-50%,-50%) scale(1.5)";

    setTimeout(()=>{
        popup.style.opacity="0";
        popup.style.transform="translate(-50%,-50%) scale(.5)";
    },1200);

}

</script>

<div class="reactions">
    <button onclick="showReaction('❤️')">❤️</button>
    <button onclick="showReaction('😍')">😍</button>
    <button onclick="showReaction('🥳')">🥳</button>
    <button onclick="showReaction('🎉')">🎉</button>
    <button onclick="showReaction('💖')">💖</button>
</div>

<div id="reactionPopup"></div>


</body>
</html>
