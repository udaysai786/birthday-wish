<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

    background:
    radial-gradient(circle at top,#2c1b5a,#120d28 45%,#050510);

    position:relative;
    font-family:Arial,sans-serif;
}

/* Floating Stars */

body::before{
    content:"";
    position:absolute;
    inset:0;

    background-image:
    radial-gradient(#fff 1px,transparent 1px),
    radial-gradient(#ffd700 1px,transparent 1px);

    background-size:60px 60px,90px 90px;

    opacity:.4;

    animation:stars 50s linear infinite;
}

@keyframes stars{

from{
transform:translateY(0);
}

to{
transform:translateY(-400px);
}

}

/* Floating Hearts */

.heart{

position:absolute;
color:#ff4f91;
font-size:20px;
animation:float 10s linear infinite;
opacity:.7;

}

@keyframes float{

0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.4);
opacity:0;
}

}

/* Card */

.card{

position:relative;
z-index:10;

animation:zoom 5s ease-in-out infinite alternate;

}

img{

width:min(90vw,700px);

border-radius:20px;

box-shadow:
0 0 40px rgba(255,180,0,.4),
0 0 90px rgba(255,105,180,.3);

}

@keyframes zoom{

from{

transform:scale(1);

}

to{

transform:scale(1.02);

}

}

</style>

</head>

<body>

<div class="card">
<img src="birthday2.png">
</div>

<script>

const symbols=["💖","✨","💕","🌸","🎈"];

for(let i=0;i<30;i++){

let s=document.createElement("div");

s.className="heart";

s.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];

s.style.left=Math.random()*100+"vw";

s.style.animationDuration=(6+Math.random()*8)+"s";

s.style.fontSize=(18+Math.random()*18)+"px";

s.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(s);

}

</script>

</body>
</html>
