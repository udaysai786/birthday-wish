<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday</title>
  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff4d6d,#ffb703);
      font-family:Arial,sans-serif;
      color:white;
      text-align:center;
    }
    .card{
      background:rgba(255,255,255,0.15);
      padding:40px;
      border-radius:20px;
      backdrop-filter:blur(8px);
      box-shadow:0 8px 25px rgba(0,0,0,0.2);
    }
    h1{
      font-size:50px;
      margin-bottom:10px;
    }
    p{
      font-size:24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 Happy Birthday 🎂</h1>
    <p>Dear [Name],</p>
    <p>Wishing you happiness, success, and lots of love! ❤️</p>
  </div>
</body>
</html>
